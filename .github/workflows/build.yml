name: Build Field Equip Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Build Mod
      run: dotnet build FieldEquipMod.csproj --configuration Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FieldEquipMod-DLL
        path: bin/Release/net472/FieldEquipMod.dll
        
